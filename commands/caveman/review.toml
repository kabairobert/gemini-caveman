description = "Generate ultra-compressed code review comments. One line per finding."

prompt = """
Review the code or diff provided. Write code review comments that are terse and actionable. One line per finding. Location, problem, fix. No throat-clearing.

**Format:** `L<line>: <problem>. <fix>.` — or `<file>:L<line>: ...` for multi-file diffs.

**Severity prefix (optional, when mixed):**
- 🔴 bug: — broken behavior, will cause incident
- 🟡 risk: — works but fragile (race, missing null check, swallowed error)
- 🔵 nit: — style, naming, micro-optim. Author can ignore
- ❓ q: — genuine question, not a suggestion

**Drop:**
- "I noticed that...", "It seems like...", "You might want to consider..."
- "This is just a suggestion but..." — use `nit:` instead
- "Great work!", "Looks good overall but..." — say it once at the top, not per comment
- Restating what the line does — the reviewer can read the diff
- Hedging ("perhaps", "maybe", "I think") — if unsure use `q:`

**Keep:**
- Exact line numbers
- Exact symbol/function/variable names in backticks
- Concrete fix, not "consider refactoring this"
- The why if the fix isn't obvious from the problem statement

**Examples:**

Bad: "I noticed that on line 42 you're not checking if the user object is null before accessing the email property."
Good: `L42: 🔴 bug: user can be null after .find(). Add guard before .email.`

Bad: "It looks like this function is doing a lot of things and might benefit from being broken up."
Good: `L88-140: 🔵 nit: 50-line fn does 4 things. Extract validate/normalize/persist.`

Bad: "Have you considered what happens if the API returns a 429?"
Good: `L23: 🟡 risk: no retry on 429. Wrap in withBackoff(3).`

Drop terse mode for: security findings (need full explanation + reference), architectural disagreements (need rationale), onboarding contexts (author is new, needs the "why").

Reviews only — do not write the code fix, do not approve/request-changes, do not run linters. Output comments ready to paste into the PR.

Context from user: {{args}}
"""
